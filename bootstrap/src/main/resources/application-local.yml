spring:
  # H2 인메모리 DB
  datasource:
    url: jdbc:h2:mem:mmadb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 1111

  h2:
    console:
      enabled: true   # http://localhost:8080/h2-console 에서 바로 확인 가능
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop   # 로컬에서는 매번 스키마 새로 생성
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis (Docker Compose로 뜨는 Valkey)
  data:
    redis:
      host: localhost
      port: 6379

  # Kafka (Docker Compose로 뜨는 Kafka)
  kafka:
    bootstrap-servers: localhost:9092

ibori:
  framework:
    security:
      jwt:
        secret: "local-dev-secret-key-minimum-32-bytes!!"
        access-token-ttl: 30m
        refresh-token-ttl: 14d